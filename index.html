<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="./static/css/style.css">
    <script src="./static/js/app.js" defer></script>
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <div class="calc">
        <div class="calcDisplay">0123456789</div>
        <div class="functions">
            <button class="ac">AC</button>
        </div>
        <div class="keys">
            <div class="digits">
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
            </div>
            <div class="operations">
                <button>+</button>
                <button>-</button>
                <button>*</button>
                <button>&divide;</button>
                <button>=</button>
            </div>            
        </div>
    </div>
</body>
</html>
